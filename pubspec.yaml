name: ttg_app_mobile
description: TrainToGain-App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.1
  dio: ^5.9.0

  flutter_riverpod: ^2.6.1
  go_router: ^13.2.5
  connectivity_plus: ^6.0.3
  app_links: ^7.0.0

  shared_preferences: ^2.3.3
  audioplayers: ^5.2.1
  fl_chart: ^0.68.0

  cupertino_icons: ^1.0.8
  phosphor_flutter: ^2.1.0
  webview_flutter: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    # vorhandene Assets
    - assets/images/login_bg.png
    - assets/images/dashboard_bg.png
    - assets/sounds/beep.mp3
    - assets/sounds/finish.mp3
    - assets/legal/privacy.html
    - assets/icons/google.png
    - assets/icons/facebook.png
    - assets/icons/instagram.png

    # neue Übungsassets
    - assets/exercises/images/
    - assets/exercises/thumbnails/
    - assets/exercises/animations/